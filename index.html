<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1208;
      --parchment: #f5efe2;
      --gold: #b8860b;
      --gold-light: #d4a840;
      --rust: #8b3a1a;
      --muted: #6b5d4a;
      --card-bg: #fdf8ee;
      --border: #d6c8a8;
    }

    body {
      background-color: var(--parchment);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(184,134,11,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(139,58,26,0.06) 0%, transparent 60%);
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s ease both;
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--muted);
      font-style: italic;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.25rem auto 0;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.75rem 2rem;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      animation: fadeUp 0.7s ease both;
      box-shadow: 0 2px 8px rgba(26,18,8,0.06);
    }

    .card:nth-child(2) { animation-delay: 0.1s; }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,18,8,0.1);
      border-color: var(--gold);
    }

    .card:hover::before { transform: scaleY(1); }

    .card-lang {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .card-script {
      font-size: 1.5rem;
      color: var(--rust);
      margin-bottom: 0.6rem;
      line-height: 1.3;
      font-style: italic;
    }

    .card-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-arrow {
      position: absolute;
      right: 1.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--border);
      transition: color 0.2s ease, right 0.2s ease;
    }

    .card:hover .card-arrow {
      color: var(--gold);
      right: 1.5rem;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--border);
      font-style: italic;
      animation: fadeUp 0.9s ease 0.3s both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Biblical Languages</p>
    <h1>Language Tools</h1>
    <p class="subtitle">Vocabulary study for Greek &amp; Hebrew</p>
    <div class="divider"></div>
  </header>

  <div class="cards">
    <a class="card" href="mathetis_greek.html">
      <p class="card-lang">New Testament · Greek</p>
      <p class="card-title">Mathetis</p>
      <p class="card-script">μαθητής</p>
      <p class="card-desc">Greek vocabulary study tool for reading the New Testament.</p>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="lamd_hebrew.html">
      <p class="card-lang">Hebrew Bible · Hebrew</p>
      <p class="card-title">Lamd</p>
      <p class="card-script">לָמַד</p>
      <p class="card-desc">Hebrew vocabulary study tool for reading the Hebrew Bible.</p>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <footer>jpkees &middot; language-tools</footer>

</body>
</html>
